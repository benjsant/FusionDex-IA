services:
  db:
    image: postgres:15
    container_name: fusiondex_postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fusiondex_db}
      POSTGRES_USER: ${POSTGRES_USER:-fusiondex_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init_postgres.sql:/docker-entrypoint-initdb.d/init_postgres.sql
    ports:
      - "${FUSIONDEX_DB_PORT:-55432}:5432"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fusiondex_user -d fusiondex_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  etl:
    build:
      context: .
      dockerfile: docker/Dockerfile.etl
    container_name: fusiondex_etl
    depends_on:
      db:
        condition: service_healthy
    environment:
      PYTHONPATH: /app
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-fusiondex_db}
      POSTGRES_USER: ${POSTGRES_USER:-fusiondex_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fusiondex_password}
    volumes:
      - ./etl:/app/etl
      - ./data:/app/data
      - ./docker:/app/docker
    networks:
      - backend
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: fusiondex_backend
    depends_on:
      db:
        condition: service_healthy
      etl:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-fusiondex_db}
      POSTGRES_USER: ${POSTGRES_USER:-fusiondex_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fusiondex_password}
      SPRITES_DIR: /app/data/sprites
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:53000,http://localhost:58000}
      # AI providers (au moins un doit être actif sinon /ai/ask renvoie 503).
      # Lus à runtime via env_file (.env). Ils sont listés explicitement
      # ici pour les rendre découvrables.
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      OLLAMA_URL:      ${OLLAMA_URL:-}
      OLLAMA_MODEL:    ${OLLAMA_MODEL:-qwen2.5:3b}
    volumes:
      - ./backend:/app/backend
      - ./data/sprites:/app/data/sprites:ro
    ports:
      - "${FUSIONDEX_BACKEND_PORT:-58000}:8000"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  sprites:
    image: nginx:alpine
    container_name: fusiondex_sprites
    volumes:
      - ./data/sprites:/usr/share/nginx/html/sprites:ro
    ports:
      - "${FUSIONDEX_SPRITES_PORT:-58080}:80"
    networks:
      - backend
    restart: unless-stopped
    depends_on:
      etl:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: fusiondex_frontend
    depends_on:
      backend:
        condition: service_healthy
    environment:
      # Proxy Next.js → backend / sprites via le réseau Docker interne.
      # Le browser n'a jamais connaissance de ces URLs.
      BACKEND_INTERNAL_URL: http://backend:8000
      SPRITES_INTERNAL_URL: http://sprites:80
    ports:
      - "${FUSIONDEX_FRONTEND_PORT:-53000}:3000"
    networks:
      - backend
    restart: unless-stopped

  # Service optionnel : LLM local Ollama pour fallback IA sans clé DeepSeek.
  # Démarre uniquement sur demande :
  #   docker compose --profile ollama up -d ollama
  # Le backend détecte sa présence via la variable OLLAMA_URL dans .env.
  # Au premier démarrage, le modèle (qwen2.5:3b ~2 GB) est téléchargé via
  # `ollama pull` lancé en parallèle de `ollama serve`.
  ollama:
    image: ollama/ollama:latest
    container_name: fusiondex_ollama
    profiles: ["ollama"]
    environment:
      OLLAMA_HOST: 0.0.0.0
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "${FUSIONDEX_OLLAMA_PORT:-58200}:11434"
    networks:
      - backend
    restart: unless-stopped
    # Pull le modèle par défaut au boot. `ollama serve` démarre en
    # background ; le `pull` attend que le serveur soit prêt puis tire
    # le modèle ; enfin `wait` reprend le PID du serveur.
    entrypoint:
      - /bin/sh
      - -c
      - |
        ollama serve &
        SERVE_PID=$$!
        sleep 3
        ollama pull "${OLLAMA_MODEL:-qwen2.5:3b}" || true
        wait $$SERVE_PID

  # Service optionnel : documentation MkDocs Material avec hot-reload.
  # Démarre uniquement sur demande :
  #   docker compose --profile docs up docs
  # N'entre pas dans `docker compose up` par défaut (pas nécessaire au run
  # de l'app) ni dans l'override prod.
  docs:
    build:
      context: .
      dockerfile: docker/Dockerfile.docs
    container_name: fusiondex_docs
    profiles: ["docs"]
    volumes:
      # Montage live pour le hot-reload. Le .venv reste dans l'image.
      - ./docs:/app/docs
      - ./mkdocs.yml:/app/mkdocs.yml
      - ./pyproject.toml:/app/pyproject.toml
      - ./uv.lock:/app/uv.lock
      # Source Python pour l'auto-doc (mkdocstrings en mode static via griffe).
      - ./backend:/app/backend:ro
    ports:
      - "${FUSIONDEX_DOCS_PORT:-58100}:58100"
    networks:
      - backend
    restart: unless-stopped

networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
  ollama_data:
